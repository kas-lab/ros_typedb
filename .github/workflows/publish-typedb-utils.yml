name: publish typedb_utils

on:
  workflow_dispatch:
  push:
    tags:
      - "typedb_utils-v*"

permissions:
  contents: read
  id-token: write

jobs:
  build:
    name: build typedb_utils distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build distribution
        working-directory: typedb_utils
        run: |
          python -m pip install --upgrade build twine
          python -m build
          python -m twine check dist/*
      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: typedb_utils-dist
          path: typedb_utils/dist/*

  publish:
    name: publish typedb_utils to PyPI
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/typedb_utils-v')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/typedb_utils
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: typedb_utils-dist
          path: dist
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
